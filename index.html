<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임의 길 찾기 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 기본 노드 스타일 */
        .node {
            width: 100%;
            height: 100%;
            border: 1px solid rgb(55, 65, 81); /* 테두리: Tailwind gray-700 */
            background-color: transparent;
            transition: background-color 0.1s ease-out;
            cursor: pointer;
        }

        /* 상태별 노드 색상 및 애니메이션 */
        .node-start {
            background-color: #fbbf24; /* Yellow-400 */
            border-color: #f59e0b;
            box-shadow: 0 0 10px #fbbf24;
            z-index: 10;
        }

        .node-end {
            background-color: #22c55e; /* Green-500 */
            border-color: #16a34a;
            box-shadow: 0 0 10px #22c55e;
            z-index: 10;
        }

        .node-wall {
            background-color: #ef4444; /* Red-500 */
            border-color: #dc2626;
            animation: pop 0.2s ease-out forwards;
        }

        /* 탐색 중인 노드 애니메이션 */
        .node-visited {
            animation: visitedAnimation 1.5s ease-out forwards;
        }

        @keyframes visitedAnimation {
            0% {
                transform: scale(0.3);
                background-color: rgba(0, 217, 159, 0.75);
                border-radius: 100%;
            }
            50% {
                background-color: rgba(0, 190, 218, 0.75);
            }
            75% {
                transform: scale(1.2);
                background-color: rgba(17, 104, 217, 0.75);
            }
            100% {
                transform: scale(1);
                background-color: rgba(0, 190, 218, 0.75);
            }
        }

        /* 최종 경로 노드 애니메이션 */
        .node-path {
            animation: pathAnimation 0.5s ease-out forwards;
        }

        @keyframes pathAnimation {
            0% {
                transform: scale(0.6);
                background-color: #fbbf24;
            }
            50% {
                transform: scale(1.2);
                background-color: #fbbf24;
            }
            100% {
                transform: scale(1);
                background-color: #fbbf24;
                box-shadow: 0 0 10px #fbbf24;
            }
        }

        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 컨트롤 패널 버튼 활성화 상태 스타일 */
        .mode-btn.active {
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
        }

        #grid-container {
            /* JS에서 설정된 크기에 맞게 격자 생성 */
            display: grid;
            gap: 0px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen w-full flex flex-col md:flex-row overflow-hidden font-sans relative">

    <!-- 방문자 수 표시 (좌측 상단 고정) -->
    <div class="absolute top-4 left-4 bg-gray-800/90 backdrop-blur-sm border border-gray-600 p-3 rounded-lg shadow-xl z-[60] flex space-x-4 items-center transition-all">
        <div class="text-center">
            <p class="text-xs text-gray-400 font-bold mb-1">오늘 방문자</p>
            <p id="visit-today" class="text-xl font-extrabold text-yellow-400">...</p>
        </div>
        <div class="h-8 w-px bg-gray-600"></div>
        <div class="text-center">
            <p class="text-xs text-gray-400 font-bold mb-1">총 방문자</p>
            <p id="visit-total" class="text-xl font-extrabold text-green-400">...</p>
        </div>
    </div>

    <!-- 왼쪽/상단: 그리드 영역 -->
    <main class="flex-1 flex justify-center items-center p-2 md:p-6 overflow-hidden relative">
        <!-- 반응형 비율 유지를 위한 래퍼 -->
        <div id="grid-wrapper" class="w-full h-full max-w-5xl max-h-full flex justify-center items-center bg-gray-800 rounded-lg shadow-2xl p-2 border border-gray-700">
            <div id="grid-container"></div>
        </div>
    </main>

    <!-- 오른쪽/하단: 컨트롤 패널 영역 -->
    <aside class="w-full md:w-80 bg-gray-800 border-t md:border-t-0 md:border-l border-gray-700 p-6 flex flex-col shadow-xl z-20 overflow-y-auto">
        <h1 class="text-2xl font-bold mb-6 text-center text-white drop-shadow-md">🚀 게임 길 찾기</h1>
        
        <!-- 알고리즘 선택 추가 -->
        <div class="mb-4">
            <h2 class="text-sm text-gray-400 mb-2 uppercase tracking-wider font-semibold">알고리즘 선택</h2>
            <select id="algorithm-select" class="w-full bg-gray-700 text-white border border-gray-600 py-2 px-3 rounded-md outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer" onchange="updateStartButton()">
                <option value="astar">A* (A-Star) 알고리즘</option>
                <option value="dijkstra">다익스트라 (Dijkstra) 알고리즘</option>
            </select>
        </div>

        <div class="space-y-6 flex-1">
            <!-- 그리기 모드 선택 -->
            <div>
                <h2 class="text-sm text-gray-400 mb-3 uppercase tracking-wider font-semibold">도구 선택 (클릭/드래그)</h2>
                <div class="grid grid-cols-1 gap-3">
                    <button id="mode-wall" class="mode-btn active bg-red-500 hover:bg-red-600 text-white py-3 px-4 rounded-md text-left flex items-center transition-all duration-200" onclick="setMode('wall')">
                        <span class="w-4 h-4 bg-white rounded-sm mr-3 opacity-50"></span>
                        장애물 (벽) 그리기
                    </button>
                    <button id="mode-start" class="mode-btn bg-gray-700 hover:bg-gray-600 text-yellow-400 py-3 px-4 rounded-md text-left flex items-center transition-all duration-200" onclick="setMode('start')">
                        <span class="w-4 h-4 bg-yellow-400 rounded-full mr-3"></span>
                        출발점 이동
                    </button>
                    <button id="mode-end" class="mode-btn bg-gray-700 hover:bg-gray-600 text-green-400 py-3 px-4 rounded-md text-left flex items-center transition-all duration-200" onclick="setMode('end')">
                        <span class="w-4 h-4 bg-green-500 rounded-full mr-3"></span>
                        도착점 이동
                    </button>
                    <button id="mode-erase" class="mode-btn bg-gray-700 hover:bg-gray-600 text-gray-300 py-3 px-4 rounded-md text-left flex items-center transition-all duration-200" onclick="setMode('erase')">
                        <span class="w-4 h-4 bg-gray-900 border border-gray-500 rounded-sm mr-3"></span>
                        지우개
                    </button>
                </div>
            </div>

            <!-- 상태 메시지 -->
            <div id="status-message" class="text-center text-sm text-blue-400 min-h-[1.5rem]">
                그리드에 벽을 그려보세요.
            </div>
        </div>

        <!-- 실행 컨트롤 -->
        <div class="mt-6 space-y-3 pt-6 border-t border-gray-700">
            <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-lg shadow-lg transform transition active:scale-95 text-lg" onclick="startAlgorithm()">
                A* 알고리즘 시작
            </button>
            <div class="flex gap-2">
                <button id="btn-clear-path" class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-200 py-3 rounded-lg transition" onclick="clearPath()">
                    경로 지우기
                </button>
                <button id="btn-clear-board" class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-200 py-3 rounded-lg transition" onclick="clearBoard()">
                    초기화
                </button>
            </div>
        </div>
    </aside>

    <script>
        // --- 설정 및 상태 변수 ---
        const ROWS = 21; // 홀수가 시각적으로 중앙 맞추기 좋음
        const COLS = 45;
        let grid = [];
        let startNode = { row: 10, col: 5 };
        let endNode = { row: 10, col: 39 };
        
        let currentMode = 'wall'; // 'wall', 'start', 'end', 'erase'
        let isMouseDown = false;
        let isAnimating = false;

        const gridContainer = document.getElementById('grid-container');
        const statusMsg = document.getElementById('status-message');

        // 알고리즘 선택에 따른 버튼 텍스트 변경
        function updateStartButton() {
            const algo = document.getElementById('algorithm-select').value;
            const btn = document.getElementById('btn-start');
            if (algo === 'astar') {
                btn.innerText = 'A* 알고리즘 시작';
            } else {
                btn.innerText = '다익스트라 알고리즘 시작';
            }
        }

        // --- 초기화 함수 ---
        function initGrid() {
            gridContainer.innerHTML = '';
            gridContainer.style.gridTemplateColumns = `repeat(${COLS}, minmax(0, 1fr))`;
            gridContainer.style.gridTemplateRows = `repeat(${ROWS}, minmax(0, 1fr))`;
            
            // 반응형 크기 조절 (화면 크기에 맞춰 셀 크기 계산)
            const wrapper = document.getElementById('grid-wrapper');
            const wrapperWidth = wrapper.clientWidth - 16; // padding 제외
            const wrapperHeight = wrapper.clientHeight - 16;
            
            const cellWidth = Math.floor(wrapperWidth / COLS);
            const cellHeight = Math.floor(wrapperHeight / ROWS);
            const cellSize = Math.min(cellWidth, cellHeight);
            
            gridContainer.style.width = `${cellSize * COLS}px`;
            gridContainer.style.height = `${cellSize * ROWS}px`;

            grid = [];
            for (let r = 0; r < ROWS; r++) {
                let currentRow = [];
                for (let c = 0; c < COLS; c++) {
                    const node = createNode(r, c);
                    currentRow.push(node);
                    gridContainer.appendChild(node.element);
                }
                grid.push(currentRow);
            }
            updateNodeVisuals();
        }

        function createNode(row, col) {
            const div = document.createElement('div');
            div.id = `node-${row}-${col}`;
            div.className = 'node';
            
            // 이벤트 리스너 추가 (마우스 드래그 지원)
            div.addEventListener('mousedown', (e) => handleMouseDown(e, row, col));
            div.addEventListener('mouseenter', (e) => handleMouseEnter(e, row, col));
            div.addEventListener('mouseup', handleMouseUp);
            // 터치 이벤트 지원 (모바일)
            div.addEventListener('touchstart', (e) => { e.preventDefault(); handleMouseDown(e, row, col); });
            div.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if(isAnimating) return;
                const touch = e.touches[0];
                const element = document.elementFromPoint(touch.clientX, touch.clientY);
                if(element && element.classList.contains('node')) {
                    const [_, r, c] = element.id.split('-');
                    handleMouseEnter(e, parseInt(r), parseInt(c));
                }
            });
            div.addEventListener('touchend', handleMouseUp);

            return {
                row,
                col,
                isWall: false,
                isVisited: false,
                isPath: false,
                distance: Infinity,
                totalDistance: Infinity,
                previousNode: null,
                element: div
            };
        }

        // --- 마우스 인터랙션 처리 ---
        function handleMouseDown(e, row, col) {
            if (isAnimating) return;
            isMouseDown = true;
            applyModeAction(row, col);
        }

        function handleMouseEnter(e, row, col) {
            if (!isMouseDown || isAnimating) return;
            
            // 출발/도착점 이동 중일 때는 하나만 존재해야 하므로 드래그 시 계속 갱신
            if(currentMode === 'start' || currentMode === 'end') {
                applyModeAction(row, col);
            } else {
                applyModeAction(row, col);
            }
        }

        function handleMouseUp() {
            isMouseDown = false;
        }

        document.body.addEventListener('mouseup', handleMouseUp);
        document.body.addEventListener('mouseleave', handleMouseUp);
        document.body.addEventListener('touchend', handleMouseUp);


        function applyModeAction(row, col) {
            const node = grid[row][col];
            const isStartNode = (row === startNode.row && col === startNode.col);
            const isEndNode = (row === endNode.row && col === endNode.col);

            if (currentMode === 'wall') {
                if (!isStartNode && !isEndNode) {
                    node.isWall = true;
                    node.element.classList.add('node-wall');
                }
            } else if (currentMode === 'erase') {
                if (!isStartNode && !isEndNode) {
                    node.isWall = false;
                    node.element.classList.remove('node-wall');
                }
            } else if (currentMode === 'start') {
                if (!isEndNode && !node.isWall) {
                    // 이전 출발점 초기화
                    grid[startNode.row][startNode.col].element.classList.remove('node-start');
                    startNode = { row, col };
                    node.element.classList.add('node-start');
                    clearPath(); // 위치 이동 시 기존 경로 초기화
                }
            } else if (currentMode === 'end') {
                if (!isStartNode && !node.isWall) {
                    // 이전 도착점 초기화
                    grid[endNode.row][endNode.col].element.classList.remove('node-end');
                    endNode = { row, col };
                    node.element.classList.add('node-end');
                    clearPath();
                }
            }
        }

        // --- UI 컨트롤 ---
        function setMode(mode) {
            if(isAnimating) return;
            currentMode = mode;
            
            // UI 업데이트
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-red-500');
                if(btn.id !== 'mode-wall') btn.classList.add('bg-gray-700');
            });
            
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.classList.add('active');
            
            if(mode === 'wall') {
                activeBtn.classList.remove('bg-gray-700');
                activeBtn.classList.add('bg-red-500');
                statusMsg.innerText = "그리드를 드래그하여 벽을 만드세요.";
            } else if (mode === 'start') {
                statusMsg.innerText = "원하는 곳을 클릭하여 출발점을 이동하세요.";
            } else if (mode === 'end') {
                statusMsg.innerText = "원하는 곳을 클릭하여 도착점을 이동하세요.";
            } else if (mode === 'erase') {
                statusMsg.innerText = "벽을 드래그하여 지우세요.";
            }
        }

        function updateNodeVisuals() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const node = grid[r][c];
                    node.element.className = 'node'; // 리셋
                    if (r === startNode.row && c === startNode.col) {
                        node.element.classList.add('node-start');
                    } else if (r === endNode.row && c === endNode.col) {
                        node.element.classList.add('node-end');
                    } else if (node.isWall) {
                        node.element.classList.add('node-wall');
                    }
                }
            }
        }

        function clearPath() {
            if (isAnimating) return;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const node = grid[r][c];
                    node.isVisited = false;
                    node.isPath = false;
                    node.distance = Infinity;
                    node.totalDistance = Infinity;
                    node.previousNode = null;
                    
                    // 시작, 끝, 벽 상태는 유지하면서 방문/경로 시각 효과만 제거
                    node.element.classList.remove('node-visited', 'node-path');
                }
            }
            statusMsg.innerText = "경로가 초기화되었습니다. 다시 시작할 수 있습니다.";
        }

        function clearBoard() {
            if (isAnimating) return;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    grid[r][c].isWall = false;
                }
            }
            // 출발/도착점 기본 위치로
            startNode = { row: Math.floor(ROWS/2), col: Math.floor(COLS/4) };
            endNode = { row: Math.floor(ROWS/2), col: Math.floor(COLS/4 * 3) };
            
            clearPath();
            updateNodeVisuals();
            setMode('wall');
            statusMsg.innerText = "모든 보드가 초기화되었습니다.";
        }

        // --- A* 알고리즘 로직 ---
        async function startAlgorithm() {
            if (isAnimating) return;
            clearPath();
            isAnimating = true;
            statusMsg.innerText = "탐색 중...";
            toggleButtons(true);

            const visitedNodesInOrder = [];
            const unvisitedNodes = [];
            
            const startNodeObj = grid[startNode.row][startNode.col];
            const endNodeObj = grid[endNode.row][endNode.col];

            startNodeObj.distance = 0;
            startNodeObj.totalDistance = heuristic(startNodeObj, endNodeObj);
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    unvisitedNodes.push(grid[r][c]);
                }
            }

            let targetFound = false;

            while (unvisitedNodes.length > 0) {
                // totalDistance(f-score) 기준 정렬
                unvisitedNodes.sort((a, b) => a.totalDistance - b.totalDistance);
                const closestNode = unvisitedNodes.shift();

                // 벽이거나 도달할 수 없으면 스킵/종료
                if (closestNode.isWall) continue;
                if (closestNode.distance === Infinity) break; 

                closestNode.isVisited = true;
                if(closestNode !== startNodeObj && closestNode !== endNodeObj) {
                    visitedNodesInOrder.push(closestNode);
                }

                // 목적지 도착
                if (closestNode === endNodeObj) {
                    targetFound = true;
                    break;
                }

                updateUnvisitedNeighbors(closestNode, endNodeObj, unvisitedNodes);
            }

            await animateSearch(visitedNodesInOrder, endNodeObj);
            
            isAnimating = false;
            toggleButtons(false);
            if(!targetFound) {
                statusMsg.innerText = "경로를 찾을 수 없습니다 (벽에 막힘).";
            }
        }

        function updateUnvisitedNeighbors(node, endNodeObj, unvisitedNodes) {
            const neighbors = getNeighbors(node);
            for (const neighbor of neighbors) {
                if (neighbor.isVisited || neighbor.isWall) continue;
                
                const tentativeDistance = node.distance + 1; // 그리드 이동 비용 1
                
                if (tentativeDistance < neighbor.distance) {
                    neighbor.distance = tentativeDistance;
                    neighbor.totalDistance = tentativeDistance + heuristic(neighbor, endNodeObj);
                    neighbor.previousNode = node;
                }
            }
        }

        function getNeighbors(node) {
            const neighbors = [];
            const { row, col } = node;
            if (row > 0) neighbors.push(grid[row - 1][col]); // 상
            if (row < ROWS - 1) neighbors.push(grid[row + 1][col]); // 하
            if (col > 0) neighbors.push(grid[row][col - 1]); // 좌
            if (col < COLS - 1) neighbors.push(grid[row][col + 1]); // 우
            return neighbors;
        }

        // 맨해튼 거리 휴리스틱 (다익스트라일 경우 0 반환)
        function heuristic(nodeA, nodeB) {
            const algo = document.getElementById('algorithm-select').value;
            if (algo === 'dijkstra') {
                return 0; // 다익스트라는 휴리스틱(도착점까지의 예상 거리) 없이 현재까지의 비용만으로 탐색
            }
            return Math.abs(nodeA.row - nodeB.row) + Math.abs(nodeA.col - nodeB.col);
        }

        // --- 애니메이션 함수 ---
        function animateSearch(visitedNodesInOrder, endNodeObj) {
            return new Promise((resolve) => {
                let delay = 10; // 탐색 속도
                
                for (let i = 0; i <= visitedNodesInOrder.length; i++) {
                    if (i === visitedNodesInOrder.length) {
                        setTimeout(async () => {
                            if(endNodeObj.previousNode) {
                                await animatePath(endNodeObj);
                                resolve();
                            } else {
                                resolve(); // 경로 없음
                            }
                        }, delay * i);
                        return;
                    }

                    setTimeout(() => {
                        const node = visitedNodesInOrder[i];
                        node.element.classList.add('node-visited');
                    }, delay * i);
                }
            });
        }

        function animatePath(endNodeObj) {
            return new Promise((resolve) => {
                const nodesInShortestPathOrder = [];
                let currentNode = endNodeObj;
                while (currentNode !== null) {
                    nodesInShortestPathOrder.unshift(currentNode);
                    currentNode = currentNode.previousNode;
                }

                let delay = 30; // 경로 그리기 속도
                statusMsg.innerText = `경로 탐색 완료! 거리: ${nodesInShortestPathOrder.length - 1}칸`;

                for (let i = 0; i < nodesInShortestPathOrder.length; i++) {
                    setTimeout(() => {
                        const node = nodesInShortestPathOrder[i];
                        if (node !== grid[startNode.row][startNode.col] && node !== grid[endNode.row][endNode.col]) {
                            node.element.classList.remove('node-visited');
                            node.element.classList.add('node-path');
                        }
                        if(i === nodesInShortestPathOrder.length -1) resolve();
                    }, delay * i);
                }
            });
        }

        function toggleButtons(disabled) {
            const btns = document.querySelectorAll('button');
            btns.forEach(btn => {
                btn.disabled = disabled;
                if(disabled) {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
            
            // 애니메이션 진행 중에는 알고리즘 선택창도 비활성화
            const selectBox = document.getElementById('algorithm-select');
            selectBox.disabled = disabled;
            if(disabled) {
                selectBox.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                selectBox.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // --- 창 크기 조절 시 그리드 재조정 방지 (반응형 대응) ---
        window.addEventListener('resize', () => {
            if(!isAnimating) {
                // 레이아웃 변경 시 그리드 크기만 재계산 로직 추가 가능
                // 현재는 CSS로 wrapper 내부에 꽉 차게 계산되어 있음
                initGrid(); 
            }
        });

        // --- 앱 시작 ---
        window.onload = () => {
            initGrid();
            startNode = { row: Math.floor(ROWS/2), col: Math.floor(COLS/4) };
            endNode = { row: Math.floor(ROWS/2), col: Math.floor(COLS/4 * 3) };
            updateNodeVisuals();
            recordVisitor();
        };

        function recordVisitor() {
            // 👇 여기에 배포 후 받은 웹앱 URL을 꼭 붙여넣으세요! 👇
            const scriptUrl = 'https://script.google.com/macros/s/AKfycbxM5a254H7DCzdLMZ6OBk6f_T2yRyzZMzBR8Ih_rQS8zlwBpQhrbz4zrR6fzUZQgzQB/exec'; // 구글 시트 주소가 아닌 Apps Script의 "웹앱 URL"을 넣어야 합니다.
            
            // 시트 주소를 잘못 넣었을 경우 발생하는 파싱 에러(HTML 반환)를 방지합니다.
            if (scriptUrl === 'YOUR_WEB_APP_URL' || scriptUrl.includes('docs.google.com/spreadsheets')) {
                document.getElementById('visit-today').innerText = '-';
                document.getElementById('visit-total').innerText = '-';
                console.warn("⚠️ Apps Script 웹앱 URL이 올바르게 설정되지 않았습니다. 구글 시트 주소가 아닌 배포된 웹앱 주소(https://script.google.com/macros/...)를 입력해주세요.");
                return;
            }
            
            // 로컬 스토리지를 이용해 하루에 1번만 조회수 증가 (새로고침 중복 방지)
            const todayStr = new Date().toLocaleDateString('ko-KR');
            const lastVisit = localStorage.getItem('visited_date');
            
            let fetchUrl = scriptUrl;
            if (lastVisit !== todayStr) {
                fetchUrl += '?action=visit'; // 방문 기록 추가 (숫자 올림)
                localStorage.setItem('visited_date', todayStr);
            } else {
                fetchUrl += '?action=get'; // 조회만 수행 (숫자 안 올림)
            }

            fetch(fetchUrl)
                .then(response => {
                    // 응답이 정상적인 JSON인지 미리 확인하여 "<!DOCTYPE html..." 에러를 방지합니다.
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        return response.json();
                    } else {
                        throw new Error("서버에서 JSON이 아닌 데이터를 반환했습니다. 입력하신 URL이 Apps Script 웹앱 주소가 맞는지 확인해주세요.");
                    }
                })
                .then(data => {
                    if (data.error) return console.error('서버 에러:', data.error);
                    document.getElementById('visit-today').innerText = data.today;
                    document.getElementById('visit-total').innerText = data.total;
                })
                .catch(error => {
                    console.error('방문자 수 로딩 실패:', error.message);
                    document.getElementById('visit-today').innerText = 'err';
                    document.getElementById('visit-total').innerText = 'err';
                });
        }
    </script>
</body>
</html>
